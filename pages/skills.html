   <style>
    body {
  display: flex;
  margin: 0;

  body {
  margin: 0;
  display: flex;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: #0f0f0f;
  color: #fff;
}

/* Sidebar */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 120px;
  height: 100vh;
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 30px;
  border-right: 2px solid #222;
  z-index: 100;
}

.sidebar .nav-links {
  list-style: none;
  padding: 0;
  margin: 0;
  width: 100%;
}

.sidebar .nav-links li {
  width: 100%;
  margin: 25px 0;
  text-align: center;
}

.sidebar .nav-links li a {
  color: #bbb;
  text-decoration: none;
  font-size: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: all 0.3s ease;
}

.sidebar .nav-links li a:hover {
  color: #00ffff;
  transform: scale(1.1);
}

.sidebar .nav-links li a i {
  font-size: 22px;
  margin-bottom: 5px;
}

.sidebar .nav-links li a span {
  font-size: 12px;
}

/* Main Content */
.main-content {
  margin-left: 120px;
  padding: 40px;
  flex: 1;
}

.main-content h1 {
  font-size: 40px;
  text-align: center;
  text-shadow: 0 0 15px #00fff2;
}

.section-title {
  font-size: 28px;
  margin-top: 80px;
  text-align: center;
  color: #00fff2;
  text-shadow: 0 0 10px #00fff2;
}

.skills-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 40px;
  margin-top: 40px;
}

/* Skill Card */
.skill-card {
  width: 160px;
  height: 200px;
  background: rgba(0, 0, 0, 0.6);
  border: 2px solid #00fff2;
  border-radius: 20px;
  box-shadow: 0 0 20px #00fff2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all 0.4s ease;
  perspective: 1000px;
  transform-style: preserve-3d;
}

.skill-card:hover {
  transform: scale(1.08) rotateY(10deg);
  box-shadow: 0 0 30px #00fff2, 0 0 60px #00fff2;
}

.skill-card img {
  width: 70px;
  height: 70px;
  object-fit: contain;
  margin-bottom: 15px;
  filter: drop-shadow(0 0 8px #00fff2);
}

.skill-card span {
  font-size: 16px;
  text-align: center;
  color: #00fff2;
}

/* Divider */
.divider {
  height: 2px;
  width: 100%;
  background: linear-gradient(to right, transparent, #00fff2, transparent);
  margin: 60px 0;
}

/* Responsive */
@media (max-width: 768px) {
  .sidebar {
    display: none;
  }

  .main-content {
    margin-left: 0;
    padding: 20px;
  }

  .skill-card {
    width: 120px;
    height: 150px;
  }

  .skill-card img {
    width: 50px;
    height: 50px;
  }

  .skill-card span {
    font-size: 14px;
  }
}
